name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    # macos-15 ships Xcode 16 / Swift 6 (the package needs swift-tools 6.0).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Self-test mutations (dry run, no writes)
        run: swift run -c release AgentsElements -- --selftest-mutations

  release:
    # On a pushed v* tag, build the .app, zip it, and publish a GitHub Release.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Select newest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Build & package app
        run: bash build.sh release --dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/AgentsElements-*.zip \
            --title "${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md
